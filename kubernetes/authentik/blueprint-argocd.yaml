apiVersion: v1
kind: ConfigMap
metadata:
  name: authentik-blueprints-argocd
data:
  argocd-provider.yaml: |
    version: 1
    metadata:
      name: argocd-oidc-provider
    entries:
      # Scope mapping that emits the user's group names as a "groups" claim
      # (ArgoCD requests scope "groups" and an essential "groups" ID-token claim).
      - model: authentik_providers_oauth2.scopemapping
        state: present
        identifiers:
          name: "OAuth Mapping: ArgoCD groups"
        id: argocd-groups-scope
        attrs:
          scope_name: groups
          description: "ArgoCD groups"
          expression: |
            return [group.name for group in request.user.ak_groups.all()]

      # OAuth2 / OIDC provider for ArgoCD. client_secret comes from the env var
      # ARGOCD_OIDC_CLIENT_SECRET (fed from Vault via VSO), so no UI step.
      - model: authentik_providers_oauth2.oauth2provider
        state: present
        identifiers:
          name: argocd
        id: argocd-provider
        attrs:
          name: argocd
          client_type: confidential
          client_id: argocd
          client_secret: !Env ARGOCD_OIDC_CLIENT_SECRET
          # Blueprint-created providers default grant_types to [] (the UI would
          # default these on). Empty => authentik rejects the authorization_code
          # request as "invalid_request / malformed". ArgoCD uses the auth-code
          # flow; refresh_token lets it refresh the session token.
          grant_types:
            - authorization_code
            - refresh_token
          authorization_flow: !Find [authentik_flows.flow, [slug, default-provider-authorization-implicit-consent]]
          invalidation_flow: !Find [authentik_flows.flow, [slug, default-provider-invalidation-flow]]
          signing_key: !Find [authentik_crypto.certificatekeypair, [name, "authentik Self-signed Certificate"]]
          redirect_uris:
            - matching_mode: strict
              url: https://argocd.internal.homelab0.xyz/auth/callback
            - matching_mode: strict
              url: http://localhost:8085/auth/callback
          property_mappings:
            - !Find [authentik_providers_oauth2.scopemapping, [managed, goauthentik.io/providers/oauth2/scope-openid]]
            - !Find [authentik_providers_oauth2.scopemapping, [managed, goauthentik.io/providers/oauth2/scope-email]]
            - !Find [authentik_providers_oauth2.scopemapping, [managed, goauthentik.io/providers/oauth2/scope-profile]]
            - !KeyOf argocd-groups-scope

      # Application tile; slug "argocd" => issuer .../application/o/argocd/
      - model: authentik_core.application
        state: present
        identifiers:
          slug: argocd
        id: argocd-app
        attrs:
          name: ArgoCD
          slug: argocd
          provider: !KeyOf argocd-provider
