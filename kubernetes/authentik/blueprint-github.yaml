apiVersion: v1
kind: ConfigMap
metadata:
  name: authentik-blueprints
data:
  github-source.yaml: |
    version: 1
    metadata:
      name: github-org-source
    entries:
      # Admin group. is_superuser grants authentik admin; the name
      # "authentik Admins" maps to role:admin in ArgoCD via its RBAC.
      - model: authentik_core.group
        state: present
        identifiers:
          name: authentik Admins
        id: admin-group
        attrs:
          is_superuser: true

      # Expression policy: gate enrollment/auth to GitHub org members only.
      # This policy ONLY decides allow/deny — it does not assign groups.
      # Admin is granted via the user property mapping below (bound to the
      # source), because group assignment must happen on the source's group
      # sync where flow_plan exists, not in a flow-root policy binding.
      - model: authentik_policies_expression.expressionpolicy
        state: present
        identifiers:
          name: github-org-membership
        id: github-org-policy
        attrs:
          expression: |
            from authentik.sources.oauth.models import OAuthSource

            accepted_org = "homelabzero"

            # Only enforce this check for logins coming from the GitHub source
            source = context.get("source")
            if not isinstance(source, OAuthSource) or source.provider_type != "github":
                return True

            connection = context["goauthentik.io/sources/connection"]
            access_token = connection.access_token

            resp = requests.get(
                "https://api.github.com/user/orgs",
                headers={
                    "Authorization": f"token {access_token}",
                    "Accept": "application/vnd.github+json",
                },
            )
            resp.raise_for_status()
            orgs = resp.json()

            if not any(o["login"] == accepted_org for o in orgs):
                ak_message(f"User is not a member of {accepted_org}.")
                return False

            return True

      # Grant admin to every org member. The above policy guarantees only org
      # members complete the flow, so this user property mapping unconditionally
      # puts them in "authentik Admins" (is_superuser). authentik's source group
      # sync reads user_properties["groups"], then matches each entry to a Group
      # by name (group_matching_mode: name_link on the source), linking the user
      # to the existing superuser group. Idempotent: re-synced on every login.
      - model: authentik_sources_oauth.oauthsourcepropertymapping
        state: present
        identifiers:
          name: github-admin-groups
        id: github-admin-mapping
        attrs:
          expression: |
            return {"groups": ["authentik Admins"]}

      # GitHub OAuth source (credentials injected via env -> !Env)
      - model: authentik_sources_oauth.oauthsource
        state: present
        identifiers:
          slug: github
        id: github-source
        attrs:
          name: GitHub
          slug: github
          enabled: true
          provider_type: github
          consumer_key: !Env GITHUB_CLIENT_ID
          consumer_secret: !Env GITHUB_CLIENT_SECRET
          additional_scopes: "read:org"
          user_matching_mode: email_link
          # Match returned group names against existing authentik groups by name,
          # so "authentik Admins" from the mapping links to the superuser group.
          group_matching_mode: name_link
          user_property_mappings:
            - !Find [authentik_sources_oauth.oauthsourcepropertymapping, [name, github-admin-groups]]
          enrollment_flow: !Find [authentik_flows.flow, [slug, default-source-enrollment]]
          authentication_flow: !Find [authentik_flows.flow, [slug, default-source-authentication]]

      # Enforce the org policy during source enrollment.
      # NOTE: !Find (not !KeyOf) on the policy — KeyOf to a same-blueprint entry
      # fails to resolve here in 2026.5.2. This binding is also not idempotent
      # on an already-populated DB (authentik matches the target on flow_uuid
      # but stores pbm_uuid), so on the current cluster this blueprint's apply
      # reports "error" after the first run; the objects above are unaffected.
      # On a fresh DB it applies cleanly once, creating this binding. The login
      # button + akadmin changes live in blueprint-login.yaml so they are never
      # blocked by this.
      - model: authentik_policies.policybinding
        state: present
        identifiers:
          policy: !Find [authentik_policies_expression.expressionpolicy, [name, github-org-membership]]
          target: !Find [authentik_flows.flow, [slug, default-source-enrollment]]
          order: 0
        attrs:
          enabled: true
