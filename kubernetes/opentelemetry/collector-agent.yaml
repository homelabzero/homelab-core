apiVersion: opentelemetry.io/v1beta1
kind: OpenTelemetryCollector
metadata:
  name: otel-agent
  namespace: monitoring
spec:
  mode: daemonset
  serviceAccount: otel-collector
  securityContext:
    runAsUser: 0
    runAsGroup: 0
  env:
    - name: K8S_NODE_NAME
      valueFrom:
        fieldRef:
          fieldPath: spec.nodeName
    - name: K8S_NODE_IP
      valueFrom:
        fieldRef:
          fieldPath: status.hostIP
  volumes:
    - name: varlogpods
      hostPath:
        path: /var/log/pods
    - name: filelog-checkpoints
      hostPath:
        path: /var/lib/otel-agent
        type: DirectoryOrCreate
  volumeMounts:
    - name: varlogpods
      mountPath: /var/log/pods
      readOnly: true
    - name: filelog-checkpoints
      mountPath: /var/lib/otel-agent
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      memory: 384Mi
  config:
    extensions:
      file_storage:
        directory: /var/lib/otel-agent
    receivers:
      prometheus:
        config:
          scrape_configs:
            - job_name: kubelet
              scheme: https
              tls_config:
                insecure_skip_verify: true
              authorization:
                credentials_file: /var/run/secrets/kubernetes.io/serviceaccount/token
              static_configs:
                - targets:
                    - ${env:K8S_NODE_IP}:10250
              relabel_configs:
                - target_label: instance
                  replacement: ${env:K8S_NODE_NAME}
                - target_label: node
                  replacement: ${env:K8S_NODE_NAME}
            - job_name: cadvisor
              scheme: https
              metrics_path: /metrics/cadvisor
              tls_config:
                insecure_skip_verify: true
              authorization:
                credentials_file: /var/run/secrets/kubernetes.io/serviceaccount/token
              static_configs:
                - targets:
                    - ${env:K8S_NODE_IP}:10250
              relabel_configs:
                - target_label: instance
                  replacement: ${env:K8S_NODE_NAME}
                - target_label: node
                  replacement: ${env:K8S_NODE_NAME}
            - job_name: node-exporter
              static_configs:
                - targets:
                    - ${env:K8S_NODE_IP}:9100
              relabel_configs:
                - target_label: instance
                  replacement: ${env:K8S_NODE_NAME}
      filelog:
        include:
          - /var/log/pods/*/*/*.log
        exclude:
          - /var/log/pods/monitoring_otel-agent*/*/*.log
        include_file_path: true
        start_at: beginning
        storage: file_storage
        operators:
          - type: container
    processors:
      memory_limiter:
        check_interval: 5s
        limit_percentage: 80
        spike_limit_percentage: 25
      batch: {}
      groupbyattrs:
        keys:
          - k8s.namespace.name
          - k8s.pod.name
          - k8s.container.name
    exporters:
      prometheusremotewrite:
        endpoint: http://vmsingle-vm.monitoring.svc:8428/api/v1/write
      otlphttp/victorialogs:
        logs_endpoint: http://vlsingle-vl.monitoring.svc:9428/insert/opentelemetry/v1/logs
        headers:
          VL-Stream-Fields: k8s.namespace.name,k8s.pod.name,k8s.container.name
    service:
      extensions: [file_storage]
      pipelines:
        metrics:
          receivers: [prometheus]
          processors: [memory_limiter, batch]
          exporters: [prometheusremotewrite]
        logs:
          receivers: [filelog]
          processors: [memory_limiter, groupbyattrs, batch]
          exporters: [otlphttp/victorialogs]
