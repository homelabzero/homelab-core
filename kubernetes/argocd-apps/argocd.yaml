apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: argocd
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "5"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  sources:
    - repoURL: https://argoproj.github.io/argo-helm
      targetRevision: 10.1.3
      chart: argo-cd
      helm:
        releaseName: argocd
        valuesObject:
          global:
            domain: argocd.internal.homelab0.xyz
          notifications:
            enabled: false
          dex:
            enabled: false
          configs:
            # Gateway terminates TLS and forwards plain HTTP to argocd-server.
            # Without insecure mode the server 307-redirects HTTP->HTTPS, which
            # loops forever behind the gateway. The chart's top-level
            # server.insecure is NOT honored in 9.5.15; it must be a param here.
            params:
              server.insecure: true
            cm:
              url: https://argocd.internal.homelab0.xyz
              admin.enabled: "false"
              webhook.github.secret: $argocd-webhook:webhook-secret
              oidc.config: |
                name: Authentik
                issuer: https://authentik.internal.homelab0.xyz/application/o/argocd/
                clientID: argocd
                clientSecret: $argocd-oidc:clientSecret
                requestedScopes:
                  - openid
                  - profile
                  - email
                  - groups
                requestedIDTokenClaims:
                  groups:
                    essential: true
            rbac:
              policy.default: ""
              policy.csv: |
                g, authentik Admins, role:admin
            repositories:
              grafana-oci:
                name: grafana-oci
                url: ghcr.io/grafana/helm-charts
                type: helm
                enableOCI: "true"
    - repoURL: https://github.com/homelabzero/homelab-core
      targetRevision: HEAD
      path: kubernetes/argocd
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
    automated:
      prune: true
      selfHeal: true
  revisionHistoryLimit: 3
