apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: openebs
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://openebs.github.io/openebs
    targetRevision: 4.5.1
    chart: openebs
    helm:
      releaseName: openebs
      valuesObject:
        engines:
          local:
            lvm:
              enabled: false
            zfs:
              enabled: false
          replicated:
            # Mayastor needs 3+ nodes to be useful; re-enable when scaling out.
            mayastor:
              enabled: false
        loki:
          enabled: false
        # Grafana Alloy only ships logs to loki, which is disabled.
        alloy:
          enabled: false
        localpv-provisioner:
          localpv:
            # Hostpath data lives on the dedicated nvme1n1 Talos user volume
            # (machine config: UserVolumeConfig "openebs" -> /var/mnt/openebs).
            basePath: /var/mnt/openebs
          hostpathClass:
            isDefaultClass: true
  destination:
    server: https://kubernetes.default.svc
    namespace: openebs
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
    automated:
      prune: true
      selfHeal: true
  revisionHistoryLimit: 3
