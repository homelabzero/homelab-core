apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: vault-secrets-operator
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "2"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://helm.releases.hashicorp.com
    chart: vault-secrets-operator
    targetRevision: 1.4.0
    helm:
      releaseName: vault-secrets-operator
      valuesObject:
        defaultVaultConnection:
          enabled: true
          address: http://vault.vault.svc.cluster.local:8200
        defaultAuthMethod:
          enabled: true
          method: kubernetes
          mount: kubernetes
          kubernetes:
            role: vault-secrets-operator
            serviceAccount: vault-auth
            tokenAudiences:
              - vault
  destination:
    server: https://kubernetes.default.svc
    namespace: vault
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
    automated:
      prune: true
      selfHeal: true
  revisionHistoryLimit: 3
  # The chart's pre-delete cleanup Job is a Helm `pre-delete` hook. ArgoCD
  # turns it into a PreDelete hook and stamps it with its own finalizers
  # (pre-delete-finalizer.argocd.argoproj.io[/cleanup]), which aren't in git
  # and therefore show as perpetual finalizer drift. Ignore them.
  ignoreDifferences:
    - group: batch
      kind: Job
      name: pdcc-vault-secrets-operator
      jsonPointers:
        - /metadata/finalizers
