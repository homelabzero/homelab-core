apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: authentik
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "4"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  sources:
    - repoURL: https://charts.goauthentik.io
      chart: authentik
      targetRevision: 2026.5.2
      helm:
        releaseName: authentik
        valuesObject:
          authentik:
            postgresql:
              host: authentik-db-rw.authentik.svc.cluster.local
              name: authentik
              user: authentik
              password: ""
          postgresql:
            enabled: false
          blueprints:
            configMaps:
              - authentik-blueprints
              - authentik-blueprints-argocd
              - authentik-blueprints-vault
              - authentik-blueprints-login
              - authentik-blueprints-github-binding
          global:
            env:
              - name: AUTHENTIK_POSTGRESQL__PASSWORD
                valueFrom:
                  secretKeyRef:
                    name: authentik-db-app
                    key: password
              - name: AUTHENTIK_SECRET_KEY
                valueFrom:
                  secretKeyRef:
                    name: authentik-secret-key
                    key: secret-key
              # Seeds akadmin with a usable password at first DB init so the
              # OOBE "set admin password" setup window never appears. akadmin is
              # then deactivated by the github blueprint, so this value is a
              # throwaway and never used to log in — we just reuse the existing
              # random secret-key. Break-glass is via `ak shell` (reset akadmin).
              - name: AUTHENTIK_BOOTSTRAP_PASSWORD
                valueFrom:
                  secretKeyRef:
                    name: authentik-secret-key
                    key: secret-key
              - name: GITHUB_CLIENT_ID
                valueFrom:
                  secretKeyRef:
                    name: authentik-github-oauth
                    key: client-id
              - name: GITHUB_CLIENT_SECRET
                valueFrom:
                  secretKeyRef:
                    name: authentik-github-oauth
                    key: client-secret
              - name: ARGOCD_OIDC_CLIENT_SECRET
                valueFrom:
                  secretKeyRef:
                    name: argocd-oidc
                    key: clientSecret
              - name: VAULT_OIDC_CLIENT_SECRET
                valueFrom:
                  secretKeyRef:
                    name: vault-oidc
                    key: clientSecret
          server:
            resources:
              requests:
                cpu: 100m
                memory: 512Mi
              limits:
                memory: 1Gi
          worker:
            resources:
              requests:
                cpu: 50m
                memory: 256Mi
              limits:
                memory: 512Mi
    - repoURL: https://github.com/homelabzero/homelab-core
      targetRevision: HEAD
      path: kubernetes/authentik
  destination:
    server: https://kubernetes.default.svc
    namespace: authentik
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
    automated:
      prune: true
      selfHeal: true
  revisionHistoryLimit: 3
