apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cilium
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  sources:
    - repoURL: https://helm.cilium.io
      targetRevision: 1.19.4
      chart: cilium
      helm:
        releaseName: cilium
        valuesObject:
          ipam:
            mode: kubernetes
          kubeProxyReplacement: true
          securityContext:
            capabilities:
              ciliumAgent:
                - CHOWN
                - KILL
                - NET_ADMIN
                - NET_RAW
                - IPC_LOCK
                - SYS_ADMIN
                - SYS_RESOURCE
                - DAC_OVERRIDE
                - FOWNER
                - SETGID
                - SETUID
              cleanCiliumState:
                - NET_ADMIN
                - SYS_ADMIN
                - SYS_RESOURCE
          cgroup:
            autoMount:
              enabled: false
            hostRoot: /sys/fs/cgroup
          k8sServiceHost: localhost
          k8sServicePort: 7445
          encryption:
            enabled: true
            type: wireguard
          gatewayAPI:
            enabled: true
          l2announcements:
            enabled: true
          mtu: 1400
          hubble:
            relay:
              enabled: true
            ui:
              enabled: true
          operator:
            replicas: 1
    - repoURL: https://github.com/dmytro-rybak/homelab
      targetRevision: HEAD
      path: kubernetes/cilium
  destination:
    server: https://kubernetes.default.svc
    namespace: kube-system
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
    automated:
      prune: true
      selfHeal: true
  revisionHistoryLimit: 3
