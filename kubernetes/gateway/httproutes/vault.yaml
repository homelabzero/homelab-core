apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: vault
  namespace: vault
spec:
  parentRefs:
    - name: gateway-internal
      namespace: gateway
      sectionName: https
  hostnames:
    - vault.internal.homelab0.xyz
  rules:
    - backendRefs:
        - name: vault-ui
          port: 8200
