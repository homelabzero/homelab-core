apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: grafana
  namespace: monitoring
spec:
  parentRefs:
    - name: gateway-internal
      namespace: gateway
      sectionName: https
  hostnames:
    - grafana.internal.homelab0.xyz
  rules:
    - backendRefs:
        - name: grafana-service
          port: 3000
