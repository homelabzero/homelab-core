apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: argocd-webhook
  namespace: argocd
spec:
  parentRefs:
    - name: gateway-public
      namespace: gateway
      sectionName: https
  hostnames:
    - argocd.homelab0.xyz
  rules:
    - matches:
        - path:
            type: Exact
            value: /api/webhook
      backendRefs:
        - name: argocd-server
          port: 80
