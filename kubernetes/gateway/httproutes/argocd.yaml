apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: argocd
  namespace: argocd
spec:
  parentRefs:
    - name: gateway-internal
      namespace: gateway
      sectionName: https
  hostnames:
    - argocd.internal.homelab0.xyz
  rules:
    - backendRefs:
        - name: argocd-server
          port: 80
