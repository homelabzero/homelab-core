apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: authentik
  namespace: authentik
spec:
  parentRefs:
    - name: gateway-internal
      namespace: gateway
      sectionName: https
  hostnames:
    - authentik.internal.homelab0.xyz
  rules:
    - backendRefs:
        - name: authentik-server
          port: 80
