apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: gateway-internal
  namespace: gateway
spec:
  gatewayClassName: cilium
  addresses:
    - type: IPAddress
      value: "10.50.0.100"
  listeners:
    - name: http
      protocol: HTTP
      port: 80
      allowedRoutes:
        namespaces:
          from: All
    - name: https
      protocol: HTTPS
      port: 443
      hostname: "*.internal.homelab0.xyz"
      tls:
        mode: Terminate
        certificateRefs:
          - name: wildcard-internal
      allowedRoutes:
        namespaces:
          from: All
