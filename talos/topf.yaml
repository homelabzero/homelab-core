clusterName: homelab
talosVersion: 1.13.0
kubernetesVersion: 1.36.1

# NetBird peer DNS — resolves only on NetBird-connected clients.
clusterEndpoint: https://talos-1.netbird.cloud:6443

# Image Factory schematic (NetBird extension); topf derives the installer image.
schematicId: "@schematic.yaml"

# Talos PKI — topf reads/writes it SOPS-encrypted, safe to commit for DR.
secretsPath: secrets.sops.yaml

nodes:
  # `ip` is topf's connection target only and must be a literal IP. Keep the
  # public IP (the only address reachable in maintenance mode). Day-2 the public
  # Talos API is unreachable from the laptop — see docs/05-talos-cluster.md.
  - host: talos-1
    ip: 148.251.156.11
    role: control-plane
