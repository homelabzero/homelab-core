# Machine + cluster config applied to every node.
machine:
  install:
    disk: /dev/nvme0n1
  time:
    servers:
      - ntp1.hetzner.de
      - ntp2.hetzner.com
      - ntp3.hetzner.net
  features:
    kubePrism:
      enabled: true
      port: 7445
  network:
    nameservers:
      - 1.1.1.1
      - 8.8.8.8
    interfaces:
      - interface: enp41s0
        dhcp: true
    # Resolve the cluster endpoint locally so on-host controllers don't need NetBird DNS.
    extraHostEntries:
      - ip: 127.0.0.1
        aliases:
          - talos-1.netbird.cloud
  # OpenEBS Mayastor prerequisites.
  sysctls:
    vm.nr_hugepages: "1024"
  nodeLabels:
    openebs.io/engine: mayastor
  kubelet:
    # Pin node IP to the public IP; exclude the ephemeral NetBird CGNAT and
    # Cilium/service ranges so the apiserver never advertises an unstable IP.
    nodeIP:
      validSubnets:
        - 0.0.0.0/0
        - "!100.64.0.0/10"
        - "!10.244.0.0/16"
        - "!10.96.0.0/12"
    extraMounts:
      - destination: /var/local
        type: bind
        source: /var/local
        options:
          - bind
          - rshared
          - rw
# Cilium replaces kube-proxy + CNI; every node is a combined control-plane + worker.
cluster:
  network:
    cni:
      name: none
  proxy:
    disabled: true
  allowSchedulingOnControlPlanes: true
  apiServer:
    extraArgs:
      anonymous-auth: "false"
    admissionControl:
      - name: PodSecurity
        configuration:
          apiVersion: pod-security.admission.config.k8s.io/v1beta1
          kind: PodSecurityConfiguration
          exemptions:
            namespaces:
              - openebs
