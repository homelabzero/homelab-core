# Dedicated nvme1n1 volume mounted at /var/mnt/openebs for OpenEBS hostpath.
apiVersion: v1alpha1
kind: UserVolumeConfig
name: openebs
provisioning:
  diskSelector:
    match: "!system_disk && disk.transport == 'nvme'"
  # nvme1n1 is 512 GB; cap below nominal to leave partition-table headroom.
  minSize: 100GB
  maxSize: 500GB
filesystem:
  type: xfs
