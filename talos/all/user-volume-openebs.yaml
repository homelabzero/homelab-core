# Dedicated data volume for OpenEBS hostpath storage.
# Consumes the only non-system NVMe (nvme1n1), formats it xfs, and mounts it
# at /var/mnt/openebs. Talos auto-propagates the mount into the kubelet, so it
# is usable directly as a hostPath — the openebs-hostpath StorageClass points
# its basePath here (see kubernetes/argocd-apps/openebs.yaml).
apiVersion: v1alpha1
kind: UserVolumeConfig
name: openebs
provisioning:
  diskSelector:
    match: "!system_disk && disk.transport == 'nvme'"
  # nvme1n1 is 512 GB; cap below nominal to leave partition-table headroom.
  minSize: 100GB
  maxSize: 500GB
filesystem:
  type: xfs
